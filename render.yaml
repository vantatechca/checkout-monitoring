services:
  - type: web
    name: checkout-monitor
    runtime: node
    plan: starter
    # --with-deps is omitted because Render's Node runtime doesn't allow sudo.
    # Render's Ubuntu base already has the shared libs Chromium needs.
    buildCommand: npm install && npx playwright install chromium
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      # Install Playwright browsers into node_modules so they survive the
      # build→runtime filesystem boundary on Render. Without this, chromium
      # lands in ~/.cache/ms-playwright which is wiped before the service starts.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"

      # Check cadence (ms). Every cycle: screenshot + analyze every store.
      - key: CHECK_INTERVAL_MS
        value: "1800000"   # 30 min

      # OK-heartbeat throttle (ms). Healthy stores only send an alert this often.
      # PROBLEM alerts always fire every cycle until resolved.
      - key: OK_ALERT_INTERVAL_MS
        value: "7200000"   # 2 h

      # Router status digest throttle (ms). Informational, not urgent.
      - key: ROUTER_STATUS_INTERVAL_MS
        value: "14400000"  # 4 h

      # Bridge health-check digest throttle (ms). Issues bypass and broadcast
      # within the next cycle; healthy state respects the throttle.
      - key: HEALTH_CHECK_INTERVAL_MS
        value: "14400000"  # 4 h

      # Master mute switch. Set to "true" / "1" / "yes" / "on" to suppress
      # ALL outbound sends (Telegram, Discord, WhatsApp, including inbound
      # /alert from the bridge). Checks still run; nothing leaves the service.
      # Useful during planned outages or payment-processor downtime.
      - key: MUTE_ALERTS
        sync: false

      # Bridge health-check endpoint URL.
      - key: BRIDGE_HEALTH_CHECK_URL
        value: "https://bridge-7.flystarcafe7.workers.dev/health-check"

      # Optional — if set, /check, /trigger and /test-alert require ?token=<value>.
      # Leave unset for open access.
      - key: TRIGGER_TOKEN
        sync: false

      # Bridge router status endpoint (fetched each cycle and broadcast to
      # Telegram + Discord)
      - key: BRIDGE_ROUTER_STATUS_URL
        value: "https://bridge-7.flystarcafe7.workers.dev/router/status"

      # Shared secret for POST /alert from the bridge Cloudflare Worker.
      # Without this the endpoint accepts unauthenticated bodies.
      - key: BRIDGE_ALERT_SECRET
        sync: false

      # Anthropic
      - key: ANTHROPIC_API_KEY
        sync: false

      # Twilio WhatsApp
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
        # Format: +14155238886 (sandbox) or your approved number
      - key: ALERT_WHATSAPP_NUMBERS
        sync: false
        # Format: +19171234567,+16471234567,+63917123456

      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
        # Comma-separated chat IDs (each recipient must /start the bot first)

      # Discord
      - key: DISCORD_WEBHOOK_URL
        sync: false

      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
        # Must be an UNSIGNED upload preset

      # Google Sheets (optional)
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
        # Paste the full service account JSON as a single line
      - key: SHEETS_ID
        sync: false
        # The ID from your Google Sheet URL

      # Proxy (optional but recommended)
      - key: PROXY_SERVER
        sync: false
        # Format: http://proxy.webshare.io:80
      - key: PROXY_USER
        sync: false
      - key: PROXY_PASS
        sync: false
