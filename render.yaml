services:
  - type: web
    name: checkout-monitor
    runtime: node
    plan: starter
    # --with-deps is omitted because Render's Node runtime doesn't allow sudo.
    # Render's Ubuntu base already has the shared libs Chromium needs.
    buildCommand: npm install && npx playwright install chromium
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      # Internal schedule (ms). Default 30 min.
      - key: CHECK_INTERVAL_MS
        value: "1800000"

      # Optional — if set, /check, /trigger, /test-alert and /clear-cooldowns
      # require ?token=<value>. Leave unset for open access.
      - key: TRIGGER_TOKEN
        sync: false

      # Per-issue repeat-alert cooldown (ms). Default 1h.
      - key: ALERT_COOLDOWN_MS
        value: "3600000"

      # Anthropic
      - key: ANTHROPIC_API_KEY
        sync: false

      # Twilio WhatsApp
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
        # Format: +14155238886 (sandbox) or your approved number
      - key: ALERT_WHATSAPP_NUMBERS
        sync: false
        # Format: +19171234567,+16471234567,+63917123456

      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
        # Comma-separated chat IDs (each recipient must /start the bot first)

      # Discord
      - key: DISCORD_WEBHOOK_URL
        sync: false

      # Cloudinary
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
        # Must be an UNSIGNED upload preset

      # Google Sheets (optional)
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
        # Paste the full service account JSON as a single line
      - key: SHEETS_ID
        sync: false
        # The ID from your Google Sheet URL

      # Proxy (optional but recommended)
      - key: PROXY_SERVER
        sync: false
        # Format: http://proxy.webshare.io:80
      - key: PROXY_USER
        sync: false
      - key: PROXY_PASS
        sync: false
